    stroke="url(#logo-gradient)"
    stroke-width="3"
    stroke-linejoin="round" />

    <path d="M 80 50
           L 50 80"
    stroke="#FFC107"
    stroke-width="12"
    stroke-linecap="round"
    stroke-linejoin="round" />
</svg>
