# Serves the Vite build under /calcpad/ for path-based hosting behind
# detail-library.modearchitecture.com (LB forwards the full path to Cloud Run).
server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;

    location = / {
        return 302 /calcpad/;
    }

    location = /calcpad {
        return 302 /calcpad/;
    }

    location /calcpad/ {
        try_files $uri $uri/ /calcpad/index.html;
    }

    location ~* ^/calcpad/.*\.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 7d;
        add_header Cache-Control "public";
        try_files $uri =404;
    }
}
