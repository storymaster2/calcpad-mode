services:
  calcpadserver:
    build:
      context: ..
      dockerfile: Calcpad.Server/Dockerfile
    container_name: calcpadce-server
    ports:
      - "${CALCPAD_PORT:-9420}:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=${ASPNETCORE_ENVIRONMENT:-Production}
      - ASPNETCORE_URLS=http://+:8080
      - CALCPAD_PORT=8080
      - CALCPAD_HOST=*
    env_file:
      - .env
    restart: unless-stopped
    volumes:
      - /tmp:/tmp
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/calcpad/sample"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - calcpadce-network
      - calcpads3_default

networks:
  calcpadce-network:
    driver: bridge
  calcpads3_default:
    external: true