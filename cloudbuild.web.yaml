# Frontend pipeline: Vite build → GCS static hosting (same bucket as Detail Library).
# Trigger: calcpad-web-update → this file (cloudbuild.web.yaml)
#
# Suggested path filters (Included):
#   Calcpad.Web/frontend/**
#   cloudbuild.web.yaml
# Suggested path filters (Ignored):
#   Calcpad.Web/backend/**
#   Calcpad.Core/**
#   Calcpad.Highlighter/**
#   Calcpad.OpenXml/**
#   Calcpad.Cli/**
#   cloudbuild.engine.yaml
#
# Publishes to:
#   gs://${_BUCKET}/${_PREFIX}/   →  https://detail-library.modearchitecture.com/calcpad/
#
# Prerequisites (one-time, GCP console / IAM):
#   1. Build SA (calcpad-serverbuild@…) needs roles/storage.objectAdmin on ${_BUCKET}
#      (or storage.objectCreator + objectViewer on prefix calcpad/).
#   2. HTTPS LB mode-detail-library already serves this bucket — no new Cloud Run
#      backend or path rule required; objects under calcpad/ are served at /calcpad/.
#   3. Detail Library: CALCPAD_EDITOR_BASE_URL=https://detail-library.modearchitecture.com/calcpad
#
# _ENGINE_URL is baked as VITE_SERVER_URL (browser calls the calc engine directly).
substitutions:
  _BUCKET: mode-detail-library
  _PREFIX: calcpad
  _ENGINE_URL: https://calcpad-server-914029425445.us-west1.run.app
  _BASE_PATH: /calcpad/

steps:
  - name: node:22
    entrypoint: bash
    env:
      - VITE_SERVER_URL=${_ENGINE_URL}
      - VITE_BASE_PATH=${_BASE_PATH}
    args:
      - -ce
      - |
        cd Calcpad.Web/frontend/calcpad-web
        npm install
        npm run build

  - name: gcr.io/cloud-builders/gsutil
    args:
      - -m
      - rsync
      - -r
      - -d
      - Calcpad.Web/frontend/calcpad-web/dist
      - gs://${_BUCKET}/${_PREFIX}

  # Short cache on the shell; long cache on hashed assets.
  - name: gcr.io/cloud-builders/gsutil
    entrypoint: bash
    args:
      - -ce
      - |
        gsutil -m setmeta -h "Cache-Control:no-cache, max-age=0" \
          "gs://${_BUCKET}/${_PREFIX}/index.html" || true
        gsutil -m setmeta -h "Cache-Control:public, max-age=31536000, immutable" \
          "gs://${_BUCKET}/${_PREFIX}/assets/**" || true

options:
  logging: CLOUD_LOGGING_ONLY
