# Frontend pipeline: calcpad-web static app → Artifact Registry → Cloud Run.
# Trigger: calcpad-web-update → this file (cloudbuild.web.yaml)
#
# Suggested path filters (Included):
#   Calcpad.Web/frontend/**
#   cloudbuild.web.yaml
# Suggested path filters (Ignored):
#   Calcpad.Web/backend/**
#   Calcpad.Core/**
#   Calcpad.Highlighter/**
#   Calcpad.OpenXml/**
#   Calcpad.Cli/**
#   cloudbuild.engine.yaml
#
# Served at https://detail-library.modearchitecture.com/calcpad/
# (_BASE_PATH baked into Vite; LB must route /calcpad → this service).
# _ENGINE_URL is baked as VITE_SERVER_URL (browser calls the engine directly).
substitutions:
  _REGION: us-west1
  _AR_REPO: calcpad-engine
  _IMAGE: calcpad-web
  _SERVICE: calcpad-web
  _ENGINE_URL: https://calcpad-server-914029425445.us-west1.run.app
  _BASE_PATH: /calcpad/

steps:
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/${_IMAGE}:$SHORT_SHA
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/${_IMAGE}:latest
      - -f
      - Calcpad.Web/frontend/Dockerfile
      - --build-arg
      - VITE_SERVER_URL=${_ENGINE_URL}
      - --build-arg
      - VITE_BASE_PATH=${_BASE_PATH}
      - Calcpad.Web/frontend

  - name: gcr.io/cloud-builders/docker
    args:
      - push
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/${_IMAGE}:$SHORT_SHA

  - name: gcr.io/cloud-builders/docker
    args:
      - push
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/${_IMAGE}:latest

  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - ${_SERVICE}
      - --image=${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/${_IMAGE}:$SHORT_SHA
      - --region=${_REGION}
      - --platform=managed
      - --port=8080
      - --allow-unauthenticated
      - --memory=512Mi
      - --cpu=1
      - --min-instances=0
      - --max-instances=3
      - --quiet

images:
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/${_IMAGE}:$SHORT_SHA
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/${_IMAGE}:latest

options:
  logging: CLOUD_LOGGING_ONLY
