# Frontend pipeline: Vite build → dedicated GCS bucket for CalcPad.
# Trigger: calcpad-web-update → this file (cloudbuild.web.yaml)
#
# Suggested path filters (Included):
#   Calcpad.Web/frontend/**
#   cloudbuild.web.yaml
# Suggested path filters (Ignored):
#   Calcpad.Web/backend/**
#   Calcpad.Core/**
#   Calcpad.Highlighter/**
#   Calcpad.OpenXml/**
#   Calcpad.Cli/**
#   cloudbuild.engine.yaml
#
# Publishes to bucket root:
#   gs://${_BUCKET}/index.html, assets/, …
# Public URL (LB path rule + prefix strip /calcpad → /):
#   https://detail-library.modearchitecture.com/calcpad/
#
# Prerequisites (one-time, GCP console / IAM):
#   1. Bucket mode-detail-library-calcpad exists (separate from Detail Library).
#   2. Build SA (calcpad-serverbuild@…) needs roles/storage.objectAdmin on ${_BUCKET}.
#   3. HTTPS LB: backend bucket for ${_BUCKET}; host/path rule for /calcpad and
#      /calcpad/* with URL rewrite that strips the /calcpad prefix so objects are
#      looked up at bucket root (index.html, assets/…).
#   4. Bucket website config: Main page + 404 page = index.html (optional SPA aid).
#   5. Detail Library: CALCPAD_EDITOR_BASE_URL=https://detail-library.modearchitecture.com/calcpad/
#
# _ENGINE_URL is baked as VITE_SERVER_URL (browser calls the calc engine directly).
# VITE_BASE_PATH stays /calcpad/ so the browser requests /calcpad/assets/….
substitutions:
  _BUCKET: mode-detail-library-calcpad
  _ENGINE_URL: https://calcpad-server-914029425445.us-west1.run.app
  _BASE_PATH: /calcpad/

steps:
  - name: node:22
    entrypoint: bash
    env:
      - VITE_SERVER_URL=${_ENGINE_URL}
      - VITE_BASE_PATH=${_BASE_PATH}
    args:
      - -ce
      - |
        cd Calcpad.Web/frontend/calcpad-web
        npm install
        npm run build

  - name: gcr.io/cloud-builders/gsutil
    args:
      - -m
      - rsync
      - -r
      - -d
      - Calcpad.Web/frontend/calcpad-web/dist
      - gs://${_BUCKET}

  # Short cache on the shell; long cache on hashed assets.
  - name: gcr.io/cloud-builders/gsutil
    entrypoint: bash
    args:
      - -ce
      - |
        gsutil -m setmeta -h "Cache-Control:no-cache, max-age=0" \
          "gs://${_BUCKET}/index.html" || true
        gsutil -m setmeta -h "Cache-Control:public, max-age=31536000, immutable" \
          "gs://${_BUCKET}/assets/**" || true

options:
  logging: CLOUD_LOGGING_ONLY
