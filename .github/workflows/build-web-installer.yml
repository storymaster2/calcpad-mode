name: Build Web Installer

on:
  workflow_call:
    inputs:
      version:
        required: true
        type: string

jobs:
  build-web-installer:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'

      - name: Build calcpad-frontend library
        working-directory: Calcpad.Web/frontend/calcpad-frontend
        run: |
          npm ci
          npm run build

      - name: Build calcpad-web frontend
        working-directory: Calcpad.Web/frontend/calcpad-web
        env:
          NEUTRALINO_BUILD: '1'
        run: |
          npm ci
          npm run build

      - name: Install calcpad-desktop dependencies
        working-directory: Calcpad.Web/frontend/calcpad-desktop
        run: npm ci

      - name: Stage Calcpad.Server extension (win-x64, self-contained)
        shell: pwsh
        env:
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: '1'
        run: |
          $extensionsDir = "Calcpad.Web/frontend/calcpad-desktop/extensions/server"
          New-Item -ItemType Directory -Path $extensionsDir -Force | Out-Null
          Get-ChildItem -Path $extensionsDir -Exclude ".gitkeep" -ErrorAction SilentlyContinue |
            Remove-Item -Recurse -Force

          node Calcpad.Web/frontend/vscode-calcpad/scripts/sync-bundled-server.mjs `
            --target="$((Resolve-Path $extensionsDir).Path)" `
            --rid=win-x64 `
            --configuration=Release `
            --keep-skia-natives

      - name: Build Neutralino package
        working-directory: Calcpad.Web/frontend/calcpad-desktop
        run: npx neu build

      - name: Install NSIS
        run: choco install nsis -y --no-progress

      - name: Build Installer
        working-directory: Calcpad.Web/frontend/calcpad-desktop/Installer
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path Output -Force | Out-Null
          & "${env:ProgramFiles(x86)}\NSIS\makensis.exe" /DAPP_VERSION="${{ inputs.version }}" CalcpadCEWeb.nsi

      - name: Upload installer artifact
        uses: actions/upload-artifact@v7
        with:
          path: Calcpad.Web/frontend/calcpad-desktop/Installer/Output/CalcpadCEWeb-setup-${{ inputs.version }}.exe
          archive: false
