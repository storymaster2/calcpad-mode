name: Build docs

on:
  workflow_call:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: '3.x'

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Install MathJax
        run: |
          npm install --no-save --package-lock=false --prefix . mathjax@4 @mathjax/mathjax-newcm-font@4
          mkdir -p docs/javascripts/mathjax/
          cp -r node_modules/mathjax/* docs/javascripts/mathjax/
          mkdir -p docs/javascripts/mathjax/output/fonts/mathjax-newcm/
          cp -r node_modules/@mathjax/mathjax-newcm-font/* docs/javascripts/mathjax/output/fonts/mathjax-newcm/

      - name: Install mkdocs-material
        run: pip install mkdocs-material mdx_truly_sane_lists

      - name: Publish Calcpad CLI for docs rendering
        run: |
          dotnet publish Calcpad.Cli/Calcpad.Cli.csproj \
            -c Release -r linux-x64 --self-contained \
            -o cli-build

      - name: Prepare CLI settings for docs rendering
        run: |
          mkdir -p "$HOME/Documents/.config/calcpad"
          cp cli-build/Settings.xml "$HOME/Documents/.config/calcpad/Settings.xml"

      - name: Build docs
        # Remove the default 404.html generated by mkdocs, because it causes path issues with GitHub Pages.
        run: |
          mkdocs build
          rm -vf site/404.html

      - name: Upload site artifact
        uses: actions/upload-artifact@v7
        with:
          name: site
          path: site/
