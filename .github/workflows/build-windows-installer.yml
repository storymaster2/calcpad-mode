name: Build Windows Installer

on:
  workflow_call:
    inputs:
      version:
        required: true
        type: string

jobs:
  build-windows-installer:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Publish CalcpadCE WPF
        run: dotnet publish Calcpad.Wpf/Calcpad.wpf.csproj -c Release -r win-x64 --self-contained false -p:Version=${{ inputs.version }}

      - name: Install NSIS
        run: choco install nsis -y --no-progress

      - name: Install NScurl NSIS plugin
        uses: negrutiu/nsis-install-plugin@v1
        with:
          github-owner: negrutiu
          github-repo: nsis-nscurl
          github-asset-regex: NScurl\.zip

      - name: Build Installer
        working-directory: Calcpad.Wpf/Installer
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path Output -Force | Out-Null
          & "${env:ProgramFiles(x86)}\NSIS\makensis.exe" /DAPP_VERSION="${{ inputs.version }}" CalcpadCE.nsi

      - name: Upload installer artifact
        uses: actions/upload-artifact@v7
        with:
          path: Calcpad.Wpf/Installer/Output/CalcpadCE-setup-${{ inputs.version }}.exe
          archive: false
