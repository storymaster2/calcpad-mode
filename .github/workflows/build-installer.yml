name: Build Installer

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  determine-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      installer_name: ${{ steps.version.outputs.installer_name }}
      portable_name: ${{ steps.version.outputs.portable_name }}
      deb_name: ${{ steps.version.outputs.deb_name }}
      rpm_name: ${{ steps.version.outputs.rpm_name }}
      tarball_name: ${{ steps.version.outputs.tarball_name }}
      is_release: ${{ steps.version.outputs.is_release }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Determine version
        id: version
        shell: bash
        run: |
          BASE_VERSION=$(sed -n 's/.*<Version>\(.*\)<\/Version>.*/\1/p' Directory.Build.props)
          SHORT_SHA=$(git rev-parse --short HEAD)

          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
            INSTALLER_NAME="CalcpadCE-setup-${VERSION}"
            PORTABLE_NAME="CalcpadCE-portable-${VERSION}"
            DEB_NAME="Calcpad.${VERSION}"
            RPM_NAME="CalcpadCE.${VERSION}"
            TARBALL_NAME="CalcpadCE-${VERSION}"
          else
            VERSION="${BASE_VERSION}-${SHORT_SHA}"
            INSTALLER_NAME="CalcpadCE-setup-${VERSION}"
            PORTABLE_NAME="CalcpadCE-portable-${VERSION}"
            DEB_NAME="Calcpad.${VERSION}"
            RPM_NAME="CalcpadCE.${VERSION}"
            TARBALL_NAME="CalcpadCE-${VERSION}"
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "installer_name=$INSTALLER_NAME" >> "$GITHUB_OUTPUT"
          echo "portable_name=$PORTABLE_NAME" >> "$GITHUB_OUTPUT"
          echo "deb_name=$DEB_NAME" >> "$GITHUB_OUTPUT"
          echo "rpm_name=$RPM_NAME" >> "$GITHUB_OUTPUT"
          echo "tarball_name=$TARBALL_NAME" >> "$GITHUB_OUTPUT"
          echo "is_release=$([[ "$GITHUB_REF" == refs/tags/v* ]] && echo true || echo false)" >> "$GITHUB_OUTPUT"

  build-windows:
    needs: determine-version
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Publish Calcpad WPF
        run: dotnet publish Calcpad.Wpf/Calcpad.wpf.csproj -c Release -r win-x64 --self-contained false -p:Version=${{ needs.determine-version.outputs.version }}

      - name: Install NSIS
        run: choco install nsis -y --no-progress

      - name: Build Installer
        working-directory: Calcpad.Wpf/Installer
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path Output -Force | Out-Null
          & "${env:ProgramFiles(x86)}\NSIS\makensis.exe" /DAPP_VERSION="${{ needs.determine-version.outputs.version }}" CalcpadCE.nsi

      - name: Rename installer
        shell: bash
        run: mv "Calcpad.Wpf/Installer/Output/CalcpadCE-setup-${{ needs.determine-version.outputs.version }}.exe" "Calcpad.Wpf/Installer/Output/${{ needs.determine-version.outputs.installer_name }}.exe" 2>/dev/null || true

      - name: Upload installer artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ needs.determine-version.outputs.installer_name }}
          path: Calcpad.Wpf/Installer/Output/${{ needs.determine-version.outputs.installer_name }}.exe

      - name: Publish portable single-file
        run: >
          dotnet publish Calcpad.Wpf/Calcpad.wpf.csproj
          -c Release -r win-x64 --self-contained false
          -p:PublishSingleFile=true
          -p:EnableCompressionInSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=true
          -p:IncludeAllContentForSelfExtract=true
          -p:Version=${{ needs.determine-version.outputs.version }}
          -o portable-output

      - name: Rename portable exe
        shell: pwsh
        run: Copy-Item 'portable-output/Calcpad.exe' 'Calcpad.Wpf/Installer/Output/${{ needs.determine-version.outputs.portable_name }}.exe'

      - name: Upload portable artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ needs.determine-version.outputs.portable_name }}
          path: Calcpad.Wpf/Installer/Output/${{ needs.determine-version.outputs.portable_name }}.exe

  build-deb:
    needs: determine-version
    runs-on: ubuntu-latest
    strategy:
      matrix:
        rid: [linux-x64, linux-arm64]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Restore packages
        working-directory: Calcpad.Cli
        run: dotnet restore Calcpad.Cli.csproj -r ${{ matrix.rid }}

      - name: Build .deb package
        working-directory: Calcpad.Cli
        run: dotnet msbuild Calcpad.Cli.csproj -t:CreateDeb -p:Configuration=Release -p:Version=${{ needs.determine-version.outputs.version }} -p:PackagePrefix=CalcpadCE -p:RuntimeIdentifier=${{ matrix.rid }}

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ needs.determine-version.outputs.deb_name }}-${{ matrix.rid }}
          path: Calcpad.Cli/bin/Release/net10.0/${{ matrix.rid }}/*.deb

  build-rpm:
    needs: determine-version
    runs-on: ubuntu-latest
    strategy:
      matrix:
        rid: [linux-x64, linux-arm64]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Install RPM tools
        run: sudo apt-get update && sudo apt-get install -y rpm

      - name: Restore packages
        working-directory: Calcpad.Cli
        run: dotnet restore Calcpad.Cli.csproj -r ${{ matrix.rid }}

      - name: Build .rpm package
        working-directory: Calcpad.Cli
        run: dotnet msbuild Calcpad.Cli.csproj -t:CreateRpm -p:Configuration=Release -p:Version=${{ needs.determine-version.outputs.version }} -p:PackagePrefix=CalcpadCE -p:RuntimeIdentifier=${{ matrix.rid }}

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ needs.determine-version.outputs.rpm_name }}-${{ matrix.rid }}
          path: Calcpad.Cli/bin/Release/net10.0/${{ matrix.rid }}/*.rpm

  build-tarball:
    needs: determine-version
    runs-on: ubuntu-latest
    strategy:
      matrix:
        rid: [linux-x64, linux-arm64]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Publish self-contained
        run: >
          dotnet publish Calcpad.Cli/Calcpad.Cli.csproj
          -c Release -r ${{ matrix.rid }} --self-contained true
          -p:Version=${{ needs.determine-version.outputs.version }}
          -o tarball-output

      - name: Create tarball
        run: |
          mv tarball-output "${{ needs.determine-version.outputs.tarball_name }}"
          tar cjf "${{ needs.determine-version.outputs.tarball_name }}-${{ matrix.rid }}.tar.bz2" "${{ needs.determine-version.outputs.tarball_name }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ needs.determine-version.outputs.tarball_name }}-${{ matrix.rid }}
          path: ${{ needs.determine-version.outputs.tarball_name }}-${{ matrix.rid }}.tar.bz2

  release:
    if: needs.determine-version.outputs.is_release == 'true'
    needs: [determine-version, build-windows, build-deb, build-rpm, build-tarball]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download Windows installer
        uses: actions/download-artifact@v4
        with:
          name: ${{ needs.determine-version.outputs.installer_name }}
          path: artifacts/

      - name: Download Windows portable
        uses: actions/download-artifact@v4
        with:
          name: ${{ needs.determine-version.outputs.portable_name }}
          path: artifacts/

      - name: Download .deb packages
        uses: actions/download-artifact@v4
        with:
          pattern: ${{ needs.determine-version.outputs.deb_name }}-*
          path: artifacts/
          merge-multiple: true

      - name: Download .rpm packages
        uses: actions/download-artifact@v4
        with:
          pattern: ${{ needs.determine-version.outputs.rpm_name }}-*
          path: artifacts/
          merge-multiple: true

      - name: Download tarballs
        uses: actions/download-artifact@v4
        with:
          pattern: ${{ needs.determine-version.outputs.tarball_name }}-*
          path: artifacts/
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
