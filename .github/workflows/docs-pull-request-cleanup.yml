name: Cleanup PR preview

on:
  pull_request_target:
    types: [closed]

permissions:
  contents: write
  pull-requests: write

jobs:
  cleanup-preview:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Remove preview
        uses: rossjrw/pr-preview-action@v1
        with:
          preview-branch: gh-pages
          pr-number: ${{ github.event.number }}
          action: remove
