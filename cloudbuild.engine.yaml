# Engine pipeline: Calcpad.Server → Artifact Registry → Cloud Run.
# Trigger: calcpad-server-update → this file (cloudbuild.engine.yaml)
#
# Suggested path filters (Included):
#   Calcpad.Web/backend/**
#   Calcpad.Core/**
#   Calcpad.Highlighter/**
#   Calcpad.OpenXml/**
#   Calcpad.Cli/**
#   cloudbuild.engine.yaml
# Suggested path filters (Ignored):
#   Calcpad.Web/frontend/**
#   docs/**
#   Examples/**
#
# Push must happen in a step before deploy; top-level `images:` runs after all steps.
substitutions:
  _REGION: us-west1
  _AR_REPO: calcpad-engine
  _IMAGE: calcpad-server
  _SERVICE: calcpad-server

steps:
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/${_IMAGE}:$SHORT_SHA
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/${_IMAGE}:latest
      - -f
      - Calcpad.Web/backend/Dockerfile
      - .

  - name: gcr.io/cloud-builders/docker
    args:
      - push
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/${_IMAGE}:$SHORT_SHA

  - name: gcr.io/cloud-builders/docker
    args:
      - push
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/${_IMAGE}:latest

  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - ${_SERVICE}
      - --image=${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/${_IMAGE}:$SHORT_SHA
      - --region=${_REGION}
      - --platform=managed
      - --quiet

images:
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/${_IMAGE}:$SHORT_SHA
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/${_IMAGE}:latest

options:
  logging: CLOUD_LOGGING_ONLY
